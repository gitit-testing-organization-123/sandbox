name: CTest

on:
  pull_request:
  push:
  workflow_dispatch:
    inputs:
      ctest_label:
        description: "Optional CTest label regex, for example: user"
        required: false
        default: ""
        type: string

jobs:
  ctest-default:
    name: Run CTest suite
    runs-on: ubuntu-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPRESS: "true"
      BASILISK_SOURCE_DIR: ${{ github.workspace }}/_deps/basilisk-src
      BASILISK_INSTALL_DIR: ${{ github.workspace }}/_deps/basilisk-install

    steps:
      - name: Checkout sandbox
        uses: actions/checkout@v4

      - name: Checkout Basilisk
        uses: actions/checkout@v4
        with:
          repository: gitit-testing-organization-123/basilisk
          ref: relocatable-install
          path: _deps/basilisk-src

      - name: Install Ubuntu dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bison \
            build-essential \
            ccache \
            cmake \
            ffmpeg \
            flex \
            gawk \
            gfortran \
            gifsicle \
            gnuplot-nox \
            imagemagick \
            libopenmpi-dev \
            ninja-build \
            openmpi-bin \
            pkg-config \
            python3 \
            python3-dev \
            swig

      - name: Restore compiler cache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ runner.os }}-${{ github.ref_name }}-
            ccache-${{ runner.os }}-

      - name: Reset compiler cache stats
        run: ccache --zero-stats

      - name: Configure Basilisk
        run: |
          cmake -S "${BASILISK_SOURCE_DIR}" -B build/basilisk \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${BASILISK_INSTALL_DIR}" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build and install Basilisk
        run: cmake --build build/basilisk --target install --parallel

      - name: Configure sandbox
        run: |
          cmake -S . -B build/sandbox \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${BASILISK_INSTALL_DIR}" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build sandbox
        run: cmake --build build/sandbox --parallel

      - name: Show compiler cache stats
        if: always()
        run: ccache --show-stats

      - name: Run CTest
        env:
          CTEST_LABEL: ${{ inputs.ctest_label }}
        run: |
          set -euo pipefail
          if command -v nproc >/dev/null 2>&1; then
            jobs="$(nproc)"
          else
            jobs="$(sysctl -n hw.logicalcpu)"
          fi
          ctest_args=(--test-dir build/sandbox --output-on-failure --parallel "${jobs}")
          if [[ -n "${CTEST_LABEL}" ]]; then
            ctest_args+=(-L "${CTEST_LABEL}")
          fi
          ctest "${ctest_args[@]}"

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-build-artifacts
          path: build/sandbox
          if-no-files-found: error
          retention-days: 7
